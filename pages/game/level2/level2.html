<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oscar Website - Nivel 2</title>

  <link rel="stylesheet" href="../../../styles/main.css" />
  <link rel="stylesheet" href="level2.css" />
</head>

<body class="level2">
  <main class="level2__scene">

    <!-- PLACA CENTRAL -->
    <section class="level2__plate" aria-label="Nivel">

      <a class="level2__inner-btn" href="ruleta/ruleta.html" aria-label="Abrir Nivel 2">
        <span class="level2__title">Nivel 2</span>
      </a>

      <!-- MARCO -->
      <img class="level2__frame" src="../../../assets/frame_level.png" alt="" />
    </section>

    <!-- CARTAS -->
    <div class="level2__cards" aria-hidden="true">
      <div class="card card--1">
        <span class="corner top">A<span class="suit heart">♥</span></span>
        <span class="center suit heart">♥</span>
        <span class="corner bottom">A<span class="suit heart">♥</span></span>
      </div>

      <div class="card card--2">
        <span class="corner top">A<span class="suit club">♣</span></span>
        <span class="center suit club">♣</span>
        <span class="corner bottom">A<span class="suit club">♣</span></span>
      </div>

      <div class="card card--3">
        <span class="corner top">A<span class="suit diamond">♦</span></span>
        <span class="center suit diamond">♦</span>
        <span class="corner bottom">A<span class="suit diamond">♦</span></span>
      </div>

      <div class="card card--4">
        <span class="corner top">A<span class="suit spade">♠</span></span>
        <span class="center suit spade">♠</span>
        <span class="corner bottom">A<span class="suit spade">♠</span></span>
      </div>

      <div class="trail trail--1"></div>
      <div class="trail trail--2"></div>
      <div class="trail trail--3"></div>
      <div class="trail trail--4"></div>
    </div>

    <!-- VOLVER (a Level 1) -->
    <a class="level2__back" href="../level1/level1.html">← volver</a>

  </main>

</body>
</html>
